<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f2f5;
    }

    .calculator {
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 340px;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 24px;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    input[type="number"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #4a90e2;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      background-color: #4a90e2;
      color: white;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #357abd;
    }

    .result {
      text-align: center;
      font-size: 1.2rem;
      color: #333;
      min-height: 32px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 6px;
    }

    .result.error {
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h1>Calculator</h1>
    <div class="input-group">
      <input type="number" id="numA" placeholder="Number A" />
      <input type="number" id="numB" placeholder="Number B" />
    </div>
    <div class="buttons">
      <button onclick="calculate('add')">Add (+)</button>
      <button onclick="calculate('subtract')">Subtract (−)</button>
      <button onclick="calculate('multiply')">Multiply (×)</button>
      <button onclick="calculate('divide')">Divide (÷)</button>
    </div>
    <div class="result" id="result">Result will appear here</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
