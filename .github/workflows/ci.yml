name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "readme.md"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "readme.md"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
